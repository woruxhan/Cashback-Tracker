<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回饋帳本</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="回饋帳本">
<link rel="apple-touch-icon" sizes="180x180" id="ati" href="">
<link rel="icon" type="image/png" id="fav" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --paper: #fdfaf4;
    --ink: #1a1410;
    --ink-faint: #8c7b6a;
    --ink-mid: #4a3f35;
    --accent: #c84b2f;
    --accent-light: #f2e4df;
    --accent-glow: rgba(200,75,47,0.12);
    --safe: #2e7d5e;
    --border: rgba(26,20,16,0.12);
    --shadow: 0 4px 24px rgba(26,20,16,0.08);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    padding: 24px 16px 80px;
    background-image:
      radial-gradient(ellipse at 80% 10%, rgba(200,75,47,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 10% 90%, rgba(200,75,47,0.04) 0%, transparent 50%);
  }
  header { text-align: center; margin-bottom: 20px; padding-top: 8px; }
  header .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    color: var(--ink-faint); text-transform: uppercase; margin-bottom: 6px;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px; font-weight: 400; letter-spacing: -0.5px;
  }
  header h1 em { font-style: italic; color: var(--accent); }

  .tab-wrap {
    display: flex; gap: 6px; align-items: center;
    margin-bottom: 16px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; padding-bottom: 2px;
  }
  .tab-wrap::-webkit-scrollbar { display: none; }
  .tab-track {
    display: flex; gap: 4px;
    background: rgba(26,20,16,0.07);
    border-radius: 12px; padding: 3px; flex: 1; min-width: 0;
  }
  .tab-item {
    flex: 1; min-width: 0; text-align: center;
    padding: 7px 10px; border-radius: 9px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--ink-faint); cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: background 0.18s, color 0.18s; user-select: none;
  }
  .tab-item.active {
    background: var(--paper); color: var(--ink);
    font-weight: 500; box-shadow: 0 1px 4px rgba(26,20,16,0.1);
  }
  .btn-tab-add {
    flex-shrink: 0; width: 36px; height: 36px;
    border-radius: 10px; border: 1px dashed rgba(200,75,47,0.4);
    background: var(--accent-light); color: var(--accent);
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .btn-tab-add:active { opacity: 0.7; }

  .card {
    background: var(--paper); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .card-body { padding: 20px; }
  .card-head {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 14px;
  }
  .card-head h2 {
    font-family: 'DM Serif Display', serif; font-size: 14px;
    font-weight: 400; color: var(--ink-faint); letter-spacing: 0.05em;
  }

  .cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cfg-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em; color: var(--ink-faint); text-transform: uppercase;
  }
  .field input, .field select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    font-family: 'DM Mono', monospace; font-size: 14px;
    color: var(--ink); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%; -webkit-appearance: none;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .btn-del-card {
    background: none; border: 1px solid var(--border); border-radius: 7px;
    padding: 5px 10px; font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; color: var(--ink-faint);
    cursor: pointer; transition: border-color 0.2s, color 0.2s; text-transform: uppercase;
  }
  .btn-del-card:hover { border-color: var(--accent); color: var(--accent); }

  .ring-section {
    padding: 28px 20px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .ring-wrap { position: relative; width: 180px; height: 180px; }
  .ring-wrap svg { transform: rotate(-90deg); overflow: visible; }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .ring-fg {
    fill: none; stroke-width: 10; stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.34,1.56,0.64,1), stroke 0.4s;
  }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 2px;
  }
  .ring-label {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.18em; color: var(--ink-faint); text-transform: uppercase;
  }
  .ring-amount {
    font-family: 'DM Serif Display', serif; font-size: 28px;
    line-height: 1; color: var(--ink); transition: color 0.4s;
  }
  .ring-amount.danger { color: var(--accent); }
  .ring-amount.safe   { color: var(--safe); }
  .ring-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-faint); }

  .stats-row { display: flex; width: 100%; gap: 10px; }
  .stat-block {
    flex: 1; text-align: center; padding: 12px 8px;
    border: 1px solid var(--border); border-radius: 10px; background: var(--bg);
  }
  .stat-label {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; color: var(--ink-faint);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }

  .period-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-top: 1px solid var(--border); gap: 12px;
  }
  .p-label {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; color: var(--ink-faint);
    text-transform: uppercase; margin-bottom: 3px;
  }
  .p-dates { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--ink-mid); font-weight: 500; }
  .days-pill {
    background: var(--accent-light); color: var(--accent);
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    padding: 5px 12px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }

  .entry-form { display: flex; flex-direction: column; gap: 10px; }
  .entry-form input, .entry-form select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    font-family: 'Noto Serif TC', serif; font-size: 15px;
    color: var(--ink); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%; -webkit-appearance: none;
  }
  .entry-form input:focus, .entry-form select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .entry-form input[type="number"] { font-family: 'DM Mono', monospace; font-size: 18px; }
  .btn-add {
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 13px;
    font-family: 'DM Mono', monospace; font-size: 13px;
    letter-spacing: 0.1em; cursor: pointer;
    transition: opacity 0.18s, transform 0.1s; text-transform: uppercase;
  }
  .btn-add:active { opacity: 0.8; transform: scale(0.98); }

  .log-header {
    padding: 16px 20px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .log-header h2 {
    font-family: 'DM Serif Display', serif; font-size: 14px;
    font-weight: 400; color: var(--ink-faint); letter-spacing: 0.05em;
  }
  .btn-clear {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em; color: var(--ink-faint);
    cursor: pointer; text-transform: uppercase; transition: border-color 0.2s, color 0.2s;
  }
  .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

  .filter-row {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
  }
  .filter-pill {
    font-family: 'DM Mono', monospace; font-size: 10px;
    padding: 4px 10px; border-radius: 20px;
    background: var(--bg); color: var(--ink-faint);
    border: 1px solid var(--border); cursor: pointer;
    transition: background 0.15s, color 0.15s; letter-spacing: 0.05em; user-select: none;
  }
  .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .log-empty {
    padding: 40px 20px; text-align: center;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; color: var(--ink-faint); text-transform: uppercase;
  }
  .log-list { list-style: none; }
  .log-item {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    animation: slideIn 0.22s ease; gap: 12px;
  }
  .log-item:last-child { border-bottom: none; }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(-5px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .log-item-left { flex: 1; min-width: 0; }
  .log-memo {
    font-size: 14px; color: var(--ink); margin-bottom: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .log-meta {
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-faint);
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .log-tag { padding: 1px 6px; border-radius: 4px; font-size: 9px; }
  .tag-food    { background:#fef3e2; color:#a06000; }
  .tag-shop    { background:#e8f0fe; color:#2a4cb0; }
  .tag-travel  { background:#e8f5ef; color:#1a6040; }
  .tag-medical { background:#fce8e8; color:#a03020; }
  .tag-other   { background:#f0ece8; color:#6a5a50; }
  .card-badge  { padding: 1px 6px; border-radius: 4px; font-size: 9px; }
  .log-amount {
    font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .btn-del {
    background: none; border: none; cursor: pointer;
    color: var(--ink-faint); font-size: 16px; line-height: 1;
    padding: 2px; transition: color 0.15s;
  }
  .btn-del:hover { color: var(--accent); }

  .total-bar {
    background: var(--ink); border-radius: 14px;
    padding: 16px 20px; margin-bottom: 16px;
    display: flex; justify-content: space-between;
    align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .total-group { display: flex; flex-direction: column; gap: 3px; }
  .total-label {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; color: rgba(253,250,244,0.5); text-transform: uppercase;
  }
  .total-value { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--paper); }
  .total-divider { width: 1px; height: 36px; background: rgba(253,250,244,0.15); flex-shrink: 0; }

  footer {
    text-align: center; margin-top: 32px;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 0.12em; color: var(--ink-faint); text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Credit Card</div>
  <h1>回饋 <em>帳本</em></h1>
</header>

<div class="tab-wrap">
  <div class="tab-track" id="tabTrack"></div>
  <button class="btn-tab-add" onclick="addCard()" title="新增卡片">＋</button>
</div>

<div class="card">
  <div class="ring-section">
    <div class="ring-wrap">
      <svg viewBox="0 0 180 180" width="180" height="180">
        <circle class="ring-bg" cx="90" cy="90" r="78"/>
        <circle class="ring-fg" id="ringFg" cx="90" cy="90" r="78"
          stroke-dasharray="490" stroke-dashoffset="490" stroke="var(--safe)"/>
      </svg>
      <div class="ring-center">
        <div class="ring-label">剩餘額度</div>
        <div class="ring-amount" id="remaining">$—</div>
        <div class="ring-sub" id="ringPct">—</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-block">
        <div class="stat-label">本期已刷</div>
        <div class="stat-value" id="statUsed">$0</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">上限</div>
        <div class="stat-value" id="statLimit">$—</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">本期筆數</div>
        <div class="stat-value" id="statCount">0</div>
      </div>
    </div>
  </div>
  <div class="period-bar">
    <div>
      <div class="p-label">本期回饋週期</div>
      <div class="p-dates" id="periodDates">—</div>
    </div>
    <div class="days-pill" id="daysLeft">計算中</div>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <div class="card-head">
      <h2 id="cfgTitle">卡片設定</h2>
      <button class="btn-del-card" onclick="deleteCard()">刪除此卡</button>
    </div>
    <div class="cfg-grid">
      <div class="field full">
        <label>卡片名稱</label>
        <input type="text" id="cardName" placeholder="e.g. 玉山 Pi 卡" maxlength="20">
      </div>
      <div class="field">
        <label>月回饋上限 $</label>
        <input type="number" id="limitInput" placeholder="3000" min="0">
      </div>
      <div class="field">
        <label>週期起始日（每月幾號）</label>
        <input type="number" id="cycleStart" placeholder="1" min="1" max="28">
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <div class="card-head"><h2>新增一筆</h2></div>
    <div class="entry-form">
      <input type="text" id="memoInput" placeholder="消費備註（選填）" maxlength="30">
      <select id="catSelect">
        <option value="other">分類：其他</option>
        <option value="food">🍜 餐飲</option>
        <option value="shop">🛍️ 購物</option>
        <option value="travel">✈️ 旅遊 / 交通</option>
        <option value="medical">💊 醫療</option>
      </select>
      <input type="number" id="amountInput" placeholder="金額（TWD）" min="1" inputmode="numeric">
      <button class="btn-add" onclick="addEntry()">＋ 記帳</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="log-header">
    <h2>消費紀錄</h2>
    <button class="btn-clear" onclick="clearFiltered()">清除顯示中</button>
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div id="logWrap">
    <div class="log-empty" id="emptyMsg">尚無紀錄</div>
    <ul class="log-list" id="logList"></ul>
  </div>
</div>

<div class="total-bar" id="totalBar"></div>

<footer>資料儲存於本機 · 不上傳任何伺服器</footer>

<script>
const STORAGE_KEY = 'cashback_v2';
const CIRC = 2 * Math.PI * 78;
const CAT_LABELS = { food:'餐飲', shop:'購物', travel:'旅遊/交通', medical:'醫療', other:'其他' };
const BADGE_COLORS = [
  ['#f2e4df','#c84b2f'], ['#e8f0fe','#2a4cb0'], ['#e8f5ef','#1a6040'],
  ['#fef3e2','#a06000'], ['#f0e8fe','#6030b0'], ['#e8f8fe','#0a6080']
];

let state = { cards: [], entries: [], activeCardId: null };
let filterCardId = 'all';

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) state = JSON.parse(r); } catch(e) {}
  if (!state.cards)   state.cards   = [];
  if (!state.entries) state.entries = [];
  if (!state.cards.length) state.cards.push(newCardObj('我的信用卡'));
  if (!state.activeCardId || !state.cards.find(c => c.id === state.activeCardId))
    state.activeCardId = state.cards[0].id;
}

function newCardObj(name) { return { id: uid(), name, limit: 0, cycleStart: 1 }; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function activeCard() { return state.cards.find(c => c.id === state.activeCardId); }
function cardById(id) { return state.cards.find(c => c.id === id); }
function badgeColor(cardId) {
  const i = state.cards.findIndex(c => c.id === cardId);
  return BADGE_COLORS[i < 0 ? 0 : i % BADGE_COLORS.length];
}

function getPeriod(cycleStart) {
  const now = new Date(), d = now.getDate(), s = cycleStart || 1;
  let pStart, pEnd;
  if (d >= s) {
    pStart = new Date(now.getFullYear(), now.getMonth(), s);
    pEnd   = new Date(now.getFullYear(), now.getMonth() + 1, s - 1);
  } else {
    pStart = new Date(now.getFullYear(), now.getMonth() - 1, s);
    pEnd   = new Date(now.getFullYear(), now.getMonth(), s - 1);
  }
  const daysLeft = Math.max(0, Math.ceil((pEnd - now + 86400000) / 86400000));
  return { pStart, pEnd, daysLeft };
}

function fmt(d) { return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }

function inPeriod(ts, cycleStart) {
  const { pStart, pEnd } = getPeriod(cycleStart);
  const t = new Date(ts);
  return t >= pStart && t <= new Date(pEnd.getFullYear(), pEnd.getMonth(), pEnd.getDate(), 23, 59, 59);
}

function renderTabs() {
  const track = document.getElementById('tabTrack');
  track.innerHTML = '';
  state.cards.forEach(c => {
    const el = document.createElement('div');
    el.className = 'tab-item' + (c.id === state.activeCardId ? ' active' : '');
    el.textContent = c.name || '未命名';
    el.onclick = () => { state.activeCardId = c.id; save(); render(); };
    track.appendChild(el);
  });
}

function renderRing() {
  const card = activeCard(); if (!card) return;
  const pe = state.entries.filter(e => e.cardId === card.id && inPeriod(e.ts, card.cycleStart));
  const used = pe.reduce((s, e) => s + e.amount, 0);
  const limit = card.limit;
  const pct = limit > 0 ? Math.min(used / limit, 1) : 0;
  const fg = document.getElementById('ringFg');
  fg.style.strokeDasharray  = CIRC;
  fg.style.strokeDashoffset = CIRC * (1 - pct);
  const danger = pct >= 0.85, safe = pct < 0.5;
  fg.style.stroke = danger ? 'var(--accent)' : safe ? 'var(--safe)' : '#c8a030';
  const remEl = document.getElementById('remaining');
  remEl.textContent = limit > 0 ? `$${Math.max(0, limit - used).toLocaleString()}` : '$—';
  remEl.className = 'ring-amount' + (danger ? ' danger' : (safe && limit > 0 ? ' safe' : ''));
  document.getElementById('ringPct').textContent = limit > 0 ? `已用 ${Math.round(pct*100)}%` : '—';
  document.getElementById('statUsed').textContent  = `$${used.toLocaleString()}`;
  document.getElementById('statLimit').textContent = limit > 0 ? `$${limit.toLocaleString()}` : '$—';
  document.getElementById('statCount').textContent = pe.length;
  const { pStart, pEnd, daysLeft } = getPeriod(card.cycleStart);
  document.getElementById('periodDates').textContent = `${fmt(pStart)} – ${fmt(pEnd)}`;
  document.getElementById('daysLeft').textContent = `還剩 ${daysLeft} 天`;
}

function renderConfig() {
  const card = activeCard(); if (!card) return;
  document.getElementById('cfgTitle').textContent = `${card.name || '卡片'} · 設定`;
  const ne = document.getElementById('cardName');
  const le = document.getElementById('limitInput');
  const ce = document.getElementById('cycleStart');
  if (document.activeElement !== ne) ne.value = card.name || '';
  if (document.activeElement !== le) le.value = card.limit || '';
  if (document.activeElement !== ce) ce.value = card.cycleStart || 1;
  document.title = (card.name || '回饋帳本') + ' · 回饋帳本';
}

function renderFilter() {
  const row = document.getElementById('filterRow');
  row.innerHTML = '';
  const mkPill = (label, id) => {
    const p = document.createElement('div');
    p.className = 'filter-pill' + (filterCardId === id ? ' active' : '');
    p.textContent = label;
    p.onclick = () => { filterCardId = id; renderFilter(); renderLog(); renderTotal(); };
    row.appendChild(p);
  };
  mkPill('全部', 'all');
  state.cards.forEach(c => mkPill(c.name || '未命名', c.id));
}

function renderLog() {
  const list = document.getElementById('logList');
  const emptyEl = document.getElementById('emptyMsg');
  list.innerHTML = '';
  let entries = (filterCardId === 'all' ? [...state.entries] : state.entries.filter(e => e.cardId === filterCardId))
    .sort((a,b) => b.ts - a.ts);
  if (!entries.length) { emptyEl.style.display = 'block'; return; }
  emptyEl.style.display = 'none';
  entries.forEach(e => {
    const card = cardById(e.cardId);
    const d = new Date(e.ts);
    const ts = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const [bg, fg] = badgeColor(e.cardId);
    const li = document.createElement('li');
    li.className = 'log-item';
    li.innerHTML = `
      <div class="log-item-left">
        <div class="log-memo">${e.memo || '（未填備註）'}</div>
        <div class="log-meta">
          <span>${ts}</span>
          <span class="log-tag tag-${e.category}">${CAT_LABELS[e.category]||'其他'}</span>
          <span class="card-badge" style="background:${bg};color:${fg}">${card?card.name:'已刪除'}</span>
        </div>
      </div>
      <div class="log-amount">
        $${e.amount.toLocaleString()}
        <button class="btn-del" onclick="deleteEntry('${e.id}')">×</button>
      </div>`;
    list.appendChild(li);
  });
}

function renderTotal() {
  const entries = filterCardId === 'all' ? state.entries : state.entries.filter(e => e.cardId === filterCardId);
  const totalAmt = entries.reduce((s,e) => s + e.amount, 0);
  const totalLimit = filterCardId === 'all'
    ? state.cards.reduce((s,c) => s + (c.limit||0), 0)
    : (cardById(filterCardId)?.limit || 0);
  const bar = document.getElementById('totalBar');
  bar.innerHTML = `
    <div class="total-group">
      <div class="total-label">${filterCardId==='all'?'全卡':'本卡'}合計</div>
      <div class="total-value">$${totalAmt.toLocaleString()}</div>
    </div>
    <div class="total-divider"></div>
    <div class="total-group">
      <div class="total-label">總上限</div>
      <div class="total-value">${totalLimit>0?'$'+totalLimit.toLocaleString():'$—'}</div>
    </div>
    <div class="total-divider"></div>
    <div class="total-group">
      <div class="total-label">總筆數</div>
      <div class="total-value">${entries.length}</div>
    </div>`;
}

function render() { renderTabs(); renderRing(); renderConfig(); renderFilter(); renderLog(); renderTotal(); }

function addCard() {
  const card = newCardObj('新卡片');
  state.cards.push(card);
  state.activeCardId = card.id;
  save(); render();
  setTimeout(() => document.getElementById('cardName').select(), 80);
}

function deleteCard() {
  if (state.cards.length <= 1) { alert('至少需要保留一張卡片'); return; }
  const card = activeCard();
  if (!confirm(`確定要刪除「${card.name||'此卡'}」？相關消費紀錄也會一併刪除。`)) return;
  state.entries = state.entries.filter(e => e.cardId !== card.id);
  state.cards   = state.cards.filter(c => c.id !== card.id);
  state.activeCardId = state.cards[0].id;
  if (filterCardId === card.id) filterCardId = 'all';
  save(); render();
}

function addEntry() {
  const memo   = document.getElementById('memoInput').value.trim();
  const cat    = document.getElementById('catSelect').value;
  const amount = parseFloat(document.getElementById('amountInput').value);
  if (!amount || amount <= 0) {
    const el = document.getElementById('amountInput');
    el.focus(); el.style.borderColor = 'var(--accent)';
    setTimeout(() => el.style.borderColor = '', 1200); return;
  }
  state.entries.push({ id: uid(), cardId: state.activeCardId, memo, category: cat, amount, ts: Date.now() });
  document.getElementById('memoInput').value   = '';
  document.getElementById('amountInput').value = '';
  document.getElementById('catSelect').value   = 'other';
  save(); render();
}

function deleteEntry(id) {
  state.entries = state.entries.filter(e => e.id !== id);
  save(); render();
}

function clearFiltered() {
  const label = filterCardId === 'all' ? '所有消費紀錄' : `「${cardById(filterCardId)?.name}」的消費紀錄`;
  if (!confirm(`確定要清除${label}？`)) return;
  state.entries = filterCardId === 'all' ? [] : state.entries.filter(e => e.cardId !== filterCardId);
  save(); render();
}

document.getElementById('cardName').addEventListener('input', e => {
  const card = activeCard(); if (!card) return;
  card.name = e.target.value; save(); renderTabs(); renderConfig(); renderFilter(); renderTotal();
});
document.getElementById('limitInput').addEventListener('input', e => {
  const card = activeCard(); if (!card) return;
  card.limit = parseFloat(e.target.value) || 0; save(); renderRing(); renderTotal();
});
document.getElementById('cycleStart').addEventListener('input', e => {
  const card = activeCard(); if (!card) return;
  card.cycleStart = Math.min(28, Math.max(1, parseInt(e.target.value) || 1));
  save(); renderRing();
});
document.getElementById('amountInput').addEventListener('keydown', e => { if (e.key==='Enter') addEntry(); });

load(); render();
setInterval(renderRing, 60000);

(function generateIcon() {
  const SIZE=512, cx=SIZE/2, cy=SIZE/2;
  const c=document.createElement('canvas'); c.width=c.height=SIZE;
  const ctx=c.getContext('2d'), r=SIZE*0.22;
  ctx.beginPath(); ctx.moveTo(r,0); ctx.lineTo(SIZE-r,0);
  ctx.quadraticCurveTo(SIZE,0,SIZE,r); ctx.lineTo(SIZE,SIZE-r);
  ctx.quadraticCurveTo(SIZE,SIZE,SIZE-r,SIZE); ctx.lineTo(r,SIZE);
  ctx.quadraticCurveTo(0,SIZE,0,SIZE-r); ctx.lineTo(0,r);
  ctx.quadraticCurveTo(0,0,r,0); ctx.closePath();
  ctx.fillStyle='#fdfaf4'; ctx.fill();
  const rr=SIZE*0.36, sw=SIZE*0.10;
  ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2);
  ctx.strokeStyle='#e8e0d4'; ctx.lineWidth=sw; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,rr,-Math.PI/2,Math.PI,false);
  ctx.strokeStyle='#c84b2f'; ctx.lineWidth=sw; ctx.lineCap='round'; ctx.stroke();
  const coinX=cx+Math.cos(Math.PI)*rr, coinY=cy+Math.sin(Math.PI)*rr;
  ctx.beginPath(); ctx.arc(coinX,coinY,SIZE*0.11,0,Math.PI*2);
  ctx.fillStyle='#c84b2f'; ctx.fill();
  ctx.fillStyle='#fdfaf4';
  ctx.font=`bold ${Math.round(SIZE*0.09)}px Georgia,serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('$',coinX,coinY);
  ctx.fillStyle='#1a1410';
  ctx.font=`700 ${Math.round(SIZE*0.38)}px "Arial Rounded MT Bold","Helvetica Neue",sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('R',cx,cy+SIZE*0.02);
  const png=c.toDataURL('image/png');
  document.getElementById('ati').href=png;
  document.getElementById('fav').href=png;
})();
</script>
</body>
