<style>
  :root {
    --bg: #f5f0e8;
    --paper: #fdfaf4;
    --ink: #1a1410;
    --ink-faint: #8c7b6a;
    --ink-mid: #4a3f35;
    --accent: #c84b2f;
    --accent-light: #f2e4df;
    --accent-glow: rgba(200, 75, 47, 0.12);
    --safe: #2e7d5e;
    --safe-light: #e0f0ea;
    --border: rgba(26,20,16,0.12);
    --shadow: 0 4px 24px rgba(26,20,16,0.08);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    padding: 24px 16px 80px;
    background-image:
      radial-gradient(ellipse at 80% 10%, rgba(200,75,47,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 10% 90%, rgba(200,75,47,0.04) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 8px;
  }

  header .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--ink);
  }

  header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  /* ── Card Config ── */
  .config-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }

  .config-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }

  .config-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }

  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* ── Progress Ring ── */
  .ring-section {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 20px 24px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .ring-wrap {
    position: relative;
    width: 180px;
    height: 180px;
  }

  .ring-wrap svg {
    transform: rotate(-90deg);
    overflow: visible;
  }

  .ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 10;
  }

  .ring-fg {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.34,1.56,0.64,1), stroke 0.4s;
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 2px;
  }

  .ring-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .ring-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    line-height: 1;
    color: var(--ink);
    transition: color 0.4s;
  }

  .ring-amount.danger { color: var(--accent); }
  .ring-amount.safe   { color: var(--safe); }

  .ring-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
  }

  /* Stats row */
  .stats-row {
    display: flex;
    width: 100%;
    gap: 0;
  }

  .stat-block {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
  }

  .stat-block:not(:last-child) { margin-right: 10px; }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }

  .stat-value.red { color: var(--accent); }
  .stat-value.green { color: var(--safe); }

  /* ── Period bar ── */
  .period-bar {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .period-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .period-info .p-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .period-info .p-dates {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink-mid);
    font-weight: 500;
  }

  .days-pill {
    background: var(--accent-light);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── Entry Form ── */
  .entry-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }

  .entry-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }

  .entry-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .entry-form input,
  .entry-form select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }

  .entry-form input:focus,
  .entry-form select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .entry-form input[type="number"] {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
  }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.18s, transform 0.1s;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .btn-add:active { opacity: 0.8; transform: scale(0.98); }

  /* ── Log ── */
  .log-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .log-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .log-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

  .log-empty {
    padding: 40px 20px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .log-list { list-style: none; }

  .log-item {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.25s ease;
    gap: 12px;
  }

  .log-item:last-child { border-bottom: none; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-item-left { flex: 1; min-width: 0; }

  .log-memo {
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .log-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .log-tag {
    background: var(--accent-light);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 9px;
  }

  .log-tag.tag-food   { background: #fef3e2; color: #c87c00; }
  .log-tag.tag-shop   { background: #e8f0fe; color: #3a5bc7; }
  .log-tag.tag-travel { background: #e8f5ef; color: #2e7d5e; }
  .log-tag.tag-medical{ background: #fce8e8; color: #c84b2f; }
  .log-tag.tag-other  { background: #f0ece8; color: #8c7b6a; }

  .log-amount {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-faint);
    font-size: 16px;
    line-height: 1;
    padding: 2px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .btn-del:hover { color: var(--accent); }

  /* ── Footer ── */
  footer {
    text-align: center;
    margin-top: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Credit Card</div>
  <h1>回饋 <em>帳本</em></h1>
</header>

<!-- Config -->
<div class="config-card">
  <h2>卡片設定</h2>
  <div class="config-row">
    <div class="field">
      <label>卡片名稱</label>
      <input type="text" id="cardName" placeholder="e.g. 玉山 Pi 卡" maxlength="20">
    </div>
    <div class="field" style="max-width:130px">
      <label>月回饋上限 $</label>
      <input type="number" id="limitInput" placeholder="3000" min="0">
    </div>
  </div>
</div>

<!-- Progress Ring -->
<div class="ring-section">
  <div class="ring-wrap">
    <svg viewBox="0 0 180 180" width="180" height="180">
      <circle class="ring-bg" cx="90" cy="90" r="78"/>
      <circle class="ring-fg" id="ringFg" cx="90" cy="90" r="78"
        stroke-dasharray="490" stroke-dashoffset="490" stroke="var(--safe)"/>
    </svg>
    <div class="ring-center">
      <div class="ring-label">剩餘額度</div>
      <div class="ring-amount" id="remaining">$—</div>
      <div class="ring-sub" id="ringPct">—%</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-block">
      <div class="stat-label">已刷</div>
      <div class="stat-value" id="statUsed">$0</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">上限</div>
      <div class="stat-value" id="statLimit">$—</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">筆數</div>
      <div class="stat-value" id="statCount">0</div>
    </div>
  </div>
</div>

<!-- Period bar -->
<div class="period-bar">
  <div class="period-info">
    <div class="p-label">本月回饋週期</div>
    <div class="p-dates" id="periodDates">—</div>
  </div>
  <div class="days-pill" id="daysLeft">計算中</div>
</div>

<!-- Entry Form -->
<div class="entry-card">
  <h2>新增一筆</h2>
  <div class="entry-form">
    <input type="text" id="memoInput" placeholder="消費備註（選填）" maxlength="30">
    <select id="catSelect">
      <option value="other">分類：其他</option>
      <option value="food">🍜 餐飲</option>
      <option value="shop">🛍️ 購物</option>
      <option value="travel">✈️ 旅遊 / 交通</option>
      <option value="medical">💊 醫療</option>
    </select>
    <input type="number" id="amountInput" placeholder="金額（TWD）" min="1" inputmode="numeric">
    <button class="btn-add" onclick="addEntry()">＋ 記帳</button>
  </div>
</div>

<!-- Log -->
<div class="log-card">
  <div class="log-header">
    <h2>消費紀錄</h2>
    <button class="btn-clear" onclick="clearAll()">清除全部</button>
  </div>
  <div id="logWrap">
    <div class="log-empty" id="emptyMsg">尚無紀錄</div>
    <ul class="log-list" id="logList"></ul>
  </div>
</div>

<footer>資料儲存於本機 · 不上傳任何伺服器</footer>

<script>
const STORAGE_KEY = 'cashback_tracker_v1';

let state = {
  cardName: '',
  limit: 0,
  entries: []   // { id, memo, category, amount, ts }
};

/* ── Persist ── */
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
}

/* ── Period ── */
function getPeriod() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const start = new Date(y, m, 1);
  const end   = new Date(y, m+1, 0);
  const daysLeft = Math.ceil((end - now) / 86400000) + 1;
  return { start, end, daysLeft, today: now };
}

function fmtDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function updatePeriod() {
  const { start, end, daysLeft } = getPeriod();
  document.getElementById('periodDates').textContent =
    `${start.getFullYear()}/${fmtDate(start)} – ${fmtDate(end)}`;
  const el = document.getElementById('daysLeft');
  el.textContent = `還剩 ${daysLeft} 天`;
}

/* ── Ring ── */
const CIRCUMFERENCE = 2 * Math.PI * 78; // 490.09

function updateRing(used, limit) {
  const remaining  = Math.max(0, limit - used);
  const pct        = limit > 0 ? Math.min(used / limit, 1) : 0;
  const offset     = CIRCUMFERENCE * (1 - pct);
  const fg         = document.getElementById('ringFg');
  const remEl      = document.getElementById('remaining');
  const pctEl      = document.getElementById('ringPct');

  fg.style.strokeDasharray  = CIRCUMFERENCE;
  fg.style.strokeDashoffset = offset;

  const danger = pct >= 0.85;
  const safe   = pct < 0.5;
  fg.style.stroke = danger ? 'var(--accent)' : safe ? 'var(--safe)' : '#c8a030';

  remEl.textContent = limit > 0 ? `$${remaining.toLocaleString()}` : '$—';
  remEl.className   = 'ring-amount' + (danger ? ' danger' : safe && limit > 0 ? ' safe' : '');
  pctEl.textContent = limit > 0 ? `已用 ${Math.round(pct*100)}%` : '—';
}

/* ── Stats ── */
function updateStats(used, limit, count) {
  document.getElementById('statUsed').textContent  = `$${used.toLocaleString()}`;
  document.getElementById('statLimit').textContent = limit > 0 ? `$${limit.toLocaleString()}` : '$—';
  document.getElementById('statCount').textContent = count;
}

/* ── Render ── */
const CAT_LABELS = {
  food: '餐飲', shop: '購物', travel: '旅遊/交通', medical: '醫療', other: '其他'
};

function render() {
  const { cardName, limit, entries } = state;

  // Card name in page title
  document.title = cardName ? `${cardName} · 回饋帳本` : '回饋帳本';

  // Config fields (don't re-set if focused)
  if (document.activeElement !== document.getElementById('cardName'))
    document.getElementById('cardName').value = cardName;
  if (document.activeElement !== document.getElementById('limitInput'))
    document.getElementById('limitInput').value = limit || '';

  const used = entries.reduce((s, e) => s + e.amount, 0);
  updateRing(used, limit);
  updateStats(used, limit, entries.length);
  updatePeriod();

  const list    = document.getElementById('logList');
  const emptyEl = document.getElementById('emptyMsg');

  list.innerHTML = '';

  if (entries.length === 0) {
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  // newest first
  [...entries].reverse().forEach(e => {
    const d   = new Date(e.ts);
    const ts  = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const li  = document.createElement('li');
    li.className = 'log-item';
    li.innerHTML = `
      <div class="log-item-left">
        <div class="log-memo">${e.memo || '（未填備註）'}</div>
        <div class="log-meta">
          <span>${ts}</span>
          <span class="log-tag tag-${e.category}">${CAT_LABELS[e.category] || '其他'}</span>
        </div>
      </div>
      <div class="log-amount">
        $${e.amount.toLocaleString()}
        <button class="btn-del" onclick="deleteEntry('${e.id}')" title="刪除">×</button>
      </div>
    `;
    list.appendChild(li);
  });
}

/* ── Actions ── */
function addEntry() {
  const memo   = document.getElementById('memoInput').value.trim();
  const cat    = document.getElementById('catSelect').value;
  const amount = parseFloat(document.getElementById('amountInput').value);

  if (!amount || amount <= 0) {
    document.getElementById('amountInput').focus();
    document.getElementById('amountInput').style.borderColor = 'var(--accent)';
    setTimeout(() => document.getElementById('amountInput').style.borderColor = '', 1200);
    return;
  }

  state.entries.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    memo, category: cat, amount, ts: Date.now()
  });

  document.getElementById('memoInput').value  = '';
  document.getElementById('amountInput').value = '';
  document.getElementById('catSelect').value  = 'other';

  save();
  render();
}

function deleteEntry(id) {
  state.entries = state.entries.filter(e => e.id !== id);
  save();
  render();
}

function clearAll() {
  if (!state.entries.length) return;
  if (!confirm('確定要清除本月所有紀錄？')) return;
  state.entries = [];
  save();
  render();
}

/* ── Config listeners ── */
document.getElementById('cardName').addEventListener('input', e => {
  state.cardName = e.target.value.trim();
  save();
  render();
});

document.getElementById('limitInput').addEventListener('input', e => {
  state.limit = parseFloat(e.target.value) || 0;
  save();
  render();
});

/* ── Enter key shortcut ── */
document.getElementById('amountInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addEntry();
});

/* ── Init ── */
load();
render();

// Refresh period countdown every minute
setInterval(updatePeriod, 60000);

/* ── Generate Apple Touch Icon ── */
(function generateIcon() {
  const SIZE = 180;
  const c = document.createElement('canvas');
  c.width = c.height = SIZE;
  const ctx = c.getContext('2d');

  // Background
  ctx.fillStyle = '#f5f0e8';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // Subtle warm gradient overlay
  const grad = ctx.createRadialGradient(SIZE*0.7, SIZE*0.2, 0, SIZE*0.5, SIZE*0.5, SIZE*0.8);
  grad.addColorStop(0, 'rgba(200,75,47,0.08)');
  grad.addColorStop(1, 'rgba(200,75,47,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, SIZE, SIZE);

  // Ring background
  const cx = SIZE / 2, cy = SIZE / 2 + 4;
  const R = 64, SW = 10;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(26,20,16,0.10)';
  ctx.lineWidth = SW;
  ctx.stroke();

  // Ring arc (~70% filled as decorative)
  ctx.beginPath();
  ctx.arc(cx, cy, R, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * 0.72);
  ctx.strokeStyle = '#c84b2f';
  ctx.lineWidth = SW;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Center character
  ctx.fillStyle = '#1a1410';
  ctx.font = 'bold 52px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('帳', cx, cy + 1);

  document.getElementById('apple-touch-icon').href = c.toDataURL('image/png');
})();
</script>
</body>
